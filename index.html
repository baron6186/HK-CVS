<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Laser & System 스마트 서비스 접수</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; margin: 0; padding: 0; background: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: 20px auto; padding: 30px; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-height: 85vh; border-radius: 12px; }
        h1, h2, h3 { color: #A7324A; }
        .section { margin-top: 25px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; text-align: left; }
        .section h3 { margin-top: 0; text-align: center; }
        .button-group { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .button-group button { background-color: #f8f9fa; border: 1px solid #ddd; color: #444; padding: 12px 20px; cursor: pointer; font-size: 14px; border-radius: 8px; transition: 0.2s; }
        .button-group button:hover { border-color: #A7324A; color: #A7324A; }
        .button-group button.selected { background-color: #A7324A; color: white; border-color: #A7324A; font-weight: bold; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; outline: none; box-sizing: border-box; font-size: 15px; }
        textarea { height: 120px; resize: none; }
        #checklist { position: fixed; bottom: 30px; right: 30px; background: #fff; border: 2px solid #A7324A; border-radius: 12px; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 2000; transition: transform 0.3s ease; }
        #checklist.hidden { transform: translateX(340px); }
        #checklist .header { background: #A7324A; color: white; padding: 12px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        #checklist .body { padding: 15px; max-height: 400px; overflow-y: auto; text-align: left; }
        #checklist ul { padding-left: 15px; margin: 0; list-style-type: '✔ '; }
        #checklist li { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #f9f9f9; padding-bottom: 4px; }
        #solutionPage { display: none; background: #fffbe6; padding: 25px; border-radius: 12px; margin-top: 30px; text-align: left; border: 1px solid #ffe58f; }
        .solution-item { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 12px; border-radius: 8px; }
        /* 전송 버튼 색상 HK 레드(#A7324A)로 변경 */
        .submit-btn { width: 100%; padding: 20px; background: #A7324A; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        .submit-btn:hover { background: #8e2a3e; }
        #nextPage { display: none; }
        .yt-link { display: inline-block; color: #cc0000; text-decoration: none; font-size: 13px; font-weight: bold; border: 1px solid #cc0000; padding: 4px 10px; border-radius: 4px; margin-top: 8px; }
        .damper-box { display: flex; gap: 5px; margin-top: 10px; }
        .damper-box button { padding: 8px; font-size: 12px; flex: 1; }
    </style>
</head>
<body>

<div id="checklist">
    <div class="header" onclick="toggleChecklist()"><strong>📋 실시간 점검 현황</strong><span>▼</span></div>
    <div class="body"><ul id="checklistContent"><li>입력된 정보 없음</li></ul></div>
</div>

<div class="container" id="mainPage">
    <h1>(주)HK Laser & System<br>스마트 서비스 가이드</h1>
    
    <div class="section">
        <h3>1. 레이저 장비 종류 선택</h3>
        <div class="button-group">
            <button id="btn-CO2" onclick="selectLaser('CO2')">CO2 레이저</button>
            <button id="btn-FIBER" onclick="selectLaser('FIBER')">FIBER 레이저</button>
        </div>
    </div>

    <div id="options"></div>

    <div class="section">
        <h3>2. 고객 및 장비 기본 정보</h3>
        <input type="text" id="serial" placeholder="장비 호기수 (예: 1234)" oninput="updateInfo()">
        <input type="text" id="company" placeholder="업체명 (필수)" oninput="updateInfo()">
        <input type="text" id="name" placeholder="담당자 성함" oninput="updateInfo()">
        <input type="text" id="contact" placeholder="연락처 (필수)" oninput="updateInfo()">
    </div>

    <div style="margin-top: 30px;">
        <button onclick="goToNextPage()" style="padding: 18px 60px; background: #A7324A; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px;">
            다음 단계: 증상 진단 →
        </button>
    </div>
</div>

<div class="container" id="nextPage">
    <h1>증상 진단 및 자가 조치</h1>
    
    <div class="section">
        <h3>□ 주요 현상 선택 □</h3>
        <div class="button-group" id="issueButtons"></div>
    </div>

    <div id="subIssueContainer"></div>

    <div id="solutionPage">
        <h2 style="color: #856404; margin-top: 0;">💡 자가 조치 가이드</h2>
        <div id="solutionContent"></div>
        
        <div class="section" style="background: #fff; border: 2px solid #A7324A;">
            <h3 style="margin-bottom: 10px;">📝 추가 메모 (기타 요청사항)</h3>
            <textarea id="extraNote" placeholder="여기에 메모를 입력하세요..." oninput="updateInfo()"></textarea>
        </div>

        <button class="submit-btn" onclick="submitToHosting()">🚀 최종 서비스 접수 전송</button>
    </div>

    <div style="margin-top: 25px;">
        <button onclick="location.reload()" style="background: #666; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer;">처음으로</button>
    </div>
</div>

<script>
    let selections = { laser: "", head: "", oscillator: "", oscTime: "", serial: "", company: "", name: "", contact: "", issue: "", subIssue: "", solutions: [], note: "" };
    const labels = { laser: "타입", head: "헤드", oscillator: "발진기", oscTime: "시간", serial: "호기", company: "업체", name: "성함", contact: "연락처", issue: "증상", subIssue: "상세", solutions: "조치", note: "메모" };

    const solutionData = {
        '치수불량': [{ title: '빔 센터 점검', desc: '중심 오차를 확인하세요.' }, { title: '공구 보정값 확인', desc: '소프트웨어 보정치를 점검하세요.' }],
        '절단면불량': [{ title: '렌즈 점검', desc: '보호유리 오염 여부를 확인하세요.' }, { title: 'LM 가이드 청소', desc: '청소 상태를 점검하세요.', link: 'https://youtu.be/TGo7Fj5IPZs' }],
        '센싱이상': [{ title: '노즐/세라믹 체결', desc: '세라믹 파손이나 풀림을 확인하세요.' }, { title: '오토 캘리브레이션', desc: '센싱 교정을 실행하세요.' }],
        '칠러이상': [{ title: '냉각수 수위', desc: '수량 부족 여부를 확인하세요.' }, { title: '현재 온도 확인', desc: '메인/미러 온도를 기록하세요.', input: true, unit: '도' }, { title: '필터 점검', desc: '먼지로 인한 과열인지 확인하세요.' }],
        '집진기이상': [{ title: '댐퍼 확인', desc: '댐퍼 개방도를 선택하세요.', isDamper: true }, { title: '필터 차압', desc: '차압 수치를 확인하세요.', input: true, unit: 'Pa' }],
        '11': [{ title: '가스 점검', desc: '혼합 가구 잔량 및 레귤레이터를 확인하세요.' }],
        '21': [{ title: '가스 치환', desc: '발진기 가스 치환을 3회 반복하세요.' }],
        '테이블세팅': [{ title: '높이 보정', desc: '세팅 가이드 영상을 참고하세요.', link: 'https://youtu.be/Dkn_zqrbNNs' }]
    };

    function selectLaser(type) {
        selections.laser = type;
        document.getElementById('btn-CO2').classList.remove('selected');
        document.getElementById('btn-FIBER').classList.remove('selected');
        document.getElementById('btn-' + type).classList.add('selected');
        let heads = type === 'CO2' ? ['S3헤드', 'S3프리스텍', 'S5헤드', '기타'] : ['RAYTOOLS', 'HY3.0', 'PROCUTTER', 'HSG', 'BOCI', '기타'];
        let oscs = type === 'CO2' ? ['파나소닉 8형', '파나소닉 10형', 'PRC', '기타'] : ['NLIGHT', 'IPG', 'MAX', 'RAYCUS', '기타'];
        document.getElementById('options').innerHTML = `
            <div class="section"><h3>□ 헤드 종류 □</h3><div class="button-group">${heads.map(h => `<button onclick="selections.head='${h}'; highlightButton(this); updateChecklist();">${h}</button>`).join('')}</div></div>
            <div class="section"><h3>□ 발진기 종류 □</h3><div class="button-group">${oscs.map(o => `<button onclick="selections.oscillator='${o}'; highlightButton(this); updateChecklist();">${o}</button>`).join('')}</div></div>
            <div class="section"><h3>□ 발진기 시간 입력 □</h3><input type="number" placeholder="시간 입력" oninput="selections.oscTime=this.value; updateChecklist();"></div>`;
        updateChecklist();
    }

    function highlightButton(btn) { Array.from(btn.parentElement.children).forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); }
    
    function updateInfo() {
        selections.serial = document.getElementById('serial').value;
        selections.company = document.getElementById('company').value;
        selections.name = document.getElementById('name').value;
        selections.contact = document.getElementById('contact').value;
        if(document.getElementById('extraNote')) selections.note = document.getElementById('extraNote').value;
        updateChecklist();
    }

    function goToNextPage() {
        if (!selections.laser || !selections.company || !selections.contact) return alert("필수 입력 사항을 확인해 주세요.");
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('nextPage').style.display = 'block';
        const issues = ['절단이상', '센싱이상', '칠러이상', '발진기알람', '집진기이상', '테이블이상', '기타'];
        document.getElementById('issueButtons').innerHTML = issues.map(i => `<button onclick="handleIssueSelection('${i}', this)">${i}</button>`).join('');
    }

    function handleIssueSelection(issue, btn) {
        highlightButton(btn); selections.issue = issue; selections.subIssue = ""; selections.solutions = [];
        const subContainer = document.getElementById('subIssueContainer');
        const solPage = document.getElementById('solutionPage');
        solPage.style.display = 'none';
        if (issue === '절단이상') {
            const subs = ['치수불량', '절단면불량', '피어싱불량', '기타'];
            subContainer.innerHTML = `<div class="section"><h3>□ 상세 현상 □</h3><div class="button-group">${subs.map(s => `<button onclick="handleSubIssueSelection('${s}', this)">${s}</button>`).join('')}</div></div>`;
        } else if (issue === '발진기알람') {
            const alarms = ['11', '18', '21', '25', '17', '27', '28', '32', '41', '기타'];
            subContainer.innerHTML = `<div class="section"><h3>□ 알람 번호 □</h3><div class="button-group">${alarms.map(a => `<button onclick="handleSubIssueSelection('${a}', this)">${a}</button>`).join('')}</div></div>`;
        } else {
            subContainer.innerHTML = ""; showSolution(issue);
        }
        updateChecklist();
    }

    function handleSubIssueSelection(sub, btn) { highlightButton(btn); selections.subIssue = sub; showSolution(sub); updateChecklist(); }

    function showSolution(key) {
        const page = document.getElementById('solutionPage');
        const content = document.getElementById('solutionContent');
        page.style.display = 'block';
        const options = solutionData[key] || [{ title: '기본 점검', desc: '해당 증상에 대해 상태 확인 후 체크해 주세요.', input: true, unit: '내용' }];
        content.innerHTML = options.map((opt, idx) => `
            <div class="solution-item">
                <div style="display: flex; align-items: flex-start; gap: 10px;">
                    <input type="checkbox" id="chk_${idx}" style="transform: scale(1.3);" onchange="updateSolutions()">
                    <div style="text-align: left;">
                        <strong>${opt.title}</strong>
                        <p style="font-size: 13px; color: #666; margin: 3px 0;">${opt.desc}</p>
                        ${opt.link ? `<a href="${opt.link}" target="_blank" class="yt-link">📺 가이드 영상 보기</a>` : ''}
                        ${opt.isDamper ? `<div class="damper-box">${['100%','75%','50%','25%'].map(v => `<button onclick="selectDamper('${v}', this)">${v}</button>`).join('')}</div>` : ''}
                        ${opt.input ? `<input type="text" placeholder="입력 (${opt.unit})" style="margin-top: 5px;" oninput="updateSolutions()">` : ''}
                    </div>
                </div>
            </div>`).join('');
    }

    let selectedDamper = "";
    function selectDamper(val, btn) {
        Array.from(btn.parentElement.children).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedDamper = val;
        btn.closest('.solution-item').querySelector('input[type="checkbox"]').checked = true;
        updateSolutions();
    }

    function updateSolutions() {
        selections.solutions = [];
        document.querySelectorAll('.solution-item').forEach(item => {
            const chk = item.querySelector('input[type="checkbox"]');
            if (chk.checked) {
                const title = item.querySelector('strong').innerText;
                const input = item.querySelector('input[type="text"]');
                if (title === '댐퍼 확인') selections.solutions.push(`댐퍼(${selectedDamper})`);
                else selections.solutions.push(input && input.value ? `${title}(${input.value})` : title);
            }
        });
        updateChecklist();
    }

    function updateChecklist() {
        const content = document.getElementById('checklistContent');
        let html = "";
        for (let key in selections) {
            if (selections[key] && key !== 'solutions') html += `<li><strong>${labels[key]}:</strong> ${selections[key]}</li>`;
        }
        if (selections.solutions.length > 0) html += `<li><strong>조치:</strong><br>${selections.solutions.join('<br>')}</li>`;
        content.innerHTML = html || "<li>입력 정보 없음</li>";
    }

    function toggleChecklist() { document.getElementById('checklist').classList.toggle('hidden'); }

    async function submitToHosting() {
        if (!selections.company || !selections.contact) return alert("업체명과 연락처는 필수입니다.");
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzb7atFl_gZq5C2FwV_9wYzzZKx1Kzsu0ucF5PV8KJoas7rDsLnDp8yjW6y-2b-aWbb/exec';
        const finalData = { timestamp: new Date().toLocaleString(), ...selections, solutions: selections.solutions.join(', '), note: selections.note };
        try {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(finalData) });
            alert("접수가 완료되었습니다. 담당 엔지니어가 곧 확인하겠습니다.");
            location.reload();
        } catch (error) {
            alert("전송 오류! 구글 시트 배포 설정을 확인하세요.");
        }
    }
</script>
</body>
</html>
</script>
</body>
</html>
